    <style>
      .product-page {
        max-width: 1000px;
        margin: 2rem auto;
        padding: 0 1.5rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3rem;
      }
      .product-gallery {
        background: #fff;
        border-radius: var(--bl-radius-lg);
        padding: 2rem;
        box-shadow: var(--bl-shadow-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        aspect-ratio: 1;
      }
      .product-gallery img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .product-info {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .product-shop {
        font-size: 0.875rem;
        color: var(--bl-text-light);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
      }
      .product-title {
        font-size: 2rem;
        color: var(--bl-text);
        font-weight: 700;
        line-height: 1.2;
        margin: 0;
      }
      .product-price {
        font-size: 2.5rem;
        color: var(--bl-text);
        font-weight: 800;
      }
      .product-description {
        color: var(--bl-text-light);
        line-height: 1.6;
        margin-top: 1rem;
      }
      .product-actions {
        margin-top: 2rem;
        display: flex;
        gap: 1rem;
      }
      .btn-add-cart {
        background: var(--bl-primary);
        color: white;
        border: none;
        padding: 1rem 2rem;
        border-radius: var(--bl-radius-full);
        font-weight: 600;
        cursor: pointer;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-size: 1.125rem;
        transition: all 0.2s;
      }
      .btn-add-cart:hover {
        background: var(--bl-primary-dark);
        transform: translateY(-2px);
      }
      @media (max-width: 768px) {
        .product-page {
          grid-template-columns: 1fr;
          gap: 1.5rem;
        }
      }
    </style>
