    <style>
      .store-header {
        background: var(--bl-surface);
        padding: 3rem 1.5rem;
        margin-bottom: 2rem;
        border-bottom: 1px solid var(--bl-border);
        text-align: center;
      }
      .store-header__title {
        font-size: 2.5rem;
        color: var(--bl-text);
        margin: 0 0 0.5rem 0;
        font-weight: 800;
      }
      .store-header__description {
        color: var(--bl-text-light);
        max-width: 600px;
        margin: 0 auto 1.5rem auto;
      }
      .store-header__meta {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        color: var(--bl-text-light);
        font-size: 0.875rem;
      }
      .store-header__meta span i {
        color: var(--bl-primary);
        margin-right: 0.5rem;
      }
      .store-products {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1.5rem 4rem 1.5rem;
      }
      /* P2-5: estado de carga -- evita que #main-content quede vacío (0 de
         altura) mientras comercio.js hace el fetch async, lo que hacía que
         el footer saltara al tope de la página por un instante. Mismo
         patrón visual de spinner que .auth-loading-spinner (Assets/styles/auth.css),
         replicado acá con las variables --bl-* ya usadas en esta página en
         vez de importar auth.css entero. */
      .store-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        min-height: 60vh;
        padding: 4rem 1.5rem;
        color: var(--bl-text-light);
      }
      .store-loading__spinner {
        width: 44px;
        height: 44px;
        border: 3px solid var(--bl-border);
        border-top-color: var(--bl-primary);
        border-radius: 50%;
        animation: store-loading-spin 0.8s linear infinite;
      }
      @keyframes store-loading-spin {
        to { transform: rotate(360deg); }
      }
    </style>
