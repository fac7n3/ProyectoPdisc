<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://cdnjs.cloudflare.com https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://*.googleusercontent.com https://*.supabase.co; connect-src 'self' https://*.supabase.co https://accounts.google.com;">
    <title>Login - Baradero Local</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script type="module" crossorigin src="/assets/login-D7CSJZIO.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/speed-insights-Dh1CyNcg.js">
    <link rel="stylesheet" crossorigin href="/assets/auth-C9N5n64s.css">
  </head>
  <body>
    <!-- Loading screen (se oculta cuando el guard confirma que NO hay sesión) -->
    <div id="loading-screen" class="auth-loading-screen">
      <div class="auth-loading-spinner"></div>
      <span class="auth-loading-text">Verificando sesión...</span>
    </div>

    <!-- Contenido principal (oculto hasta que el guard lo habilite) -->
    <div id="main-content">
      <main class="auth-layout">
        <div class="auth-header">
          <div class="auth-brand-text">
            <span class="auth-brand-line">BARADERO</span>
            <span class="auth-brand-line auth-brand-line--white">LOCAL</span>
          </div>
          <p class="auth-slogan">"Mientras otras plataformas conectan personas lejanas, nosotros conectamos vecinos".</p>
        </div>
        <div class="auth-card">
          <form id="login-form">
            <div class="auth-inputs">
              <label for="correo" class="sr-only">Correo electrónico</label>
              <input id="correo" type="email" placeholder="Correo electrónico" autocomplete="email" class="auth-input" required />
              
              <div class="password-wrapper">
                <label for="password" class="sr-only">Contraseña</label>
                <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password" class="auth-input" required />
                <button type="button" class="password-toggle-btn" id="toggle-password" aria-label="Mostrar contraseña">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>

            <!-- Checkbox Términos y Condiciones -->
            <label class="auth-terms" for="terms-checkbox" id="terms-label">
              <input type="checkbox" id="terms-checkbox" name="terms" />
              <span class="auth-terms__custom-check"></span>
              <span class="auth-terms__text">
                Acepto los <a href="./terminos.html" class="auth-terms__link" target="_blank">Términos y Condiciones</a> de uso de Baradero Local.
              </span>
            </label>
            
            <button id="local-login-btn" class="auth-btn auth-btn-primary" type="submit">Iniciar sesión</button>
          </form>
          
          <div class="auth-forgot">
            <a href="#" id="forgot-password-link">¿Olvidaste tu contraseña?</a>
          </div>
          
          <!-- Checkbox duplicado eliminado: se usa el mismo #terms-checkbox para ambas acciones -->
          <button id="google-login-btn" class="auth-btn auth-btn-outline" type="button">
            <i class="fa-brands fa-google" style="margin-right: 8px;"></i>Iniciar sesión con Google
          </button>
          
          <a href="./register.html" class="auth-btn auth-btn-ghost">
            Registrarse
          </a>
          
          <a href="./home.html" class="auth-btn auth-btn-ghost" style="margin-top: 8px; opacity: 0.7; font-size: 0.9rem; text-decoration: underline;">
            Quizás más tarde
          </a>
        </div>
      </main>
    </div>

  </body>
</html>
