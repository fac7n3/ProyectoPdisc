    <style>
      .messages-container {
        max-width: 1000px;
        margin: 2rem auto;
        padding: 0 1.5rem;
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 1.5rem;
        min-height: 60vh;
      }
      @media (max-width: 768px) {
        .messages-container {
          grid-template-columns: 1fr;
        }
      }
      .conversations-panel {
        background: var(--bl-surface);
        border: 1px solid var(--bl-border);
        border-radius: var(--bl-radius-lg);
        overflow: hidden;
        max-height: 70vh;
        overflow-y: auto;
      }
      .conversation-item {
        display: block;
        width: 100%;
        text-align: left;
        padding: 1rem;
        border: none;
        border-bottom: 1px solid var(--bl-border-light);
        background: white;
        cursor: pointer;
      }
      .conversation-item:hover {
        background: var(--bl-surface-hover);
      }
      .conversation-item.active {
        background: var(--bl-surface-alt);
        border-left: 3px solid var(--bl-primary);
      }
      .conversation-item strong {
        display: block;
      }
      .conversation-item small {
        color: var(--bl-text-muted);
      }
      .thread-panel {
        background: var(--bl-surface);
        border: 1px solid var(--bl-border);
        border-radius: var(--bl-radius-lg);
        display: flex;
        flex-direction: column;
        min-height: 60vh;
      }
      .thread-header {
        padding: 1rem;
        border-bottom: 1px solid var(--bl-border);
        font-weight: 700;
      }
      .thread-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .message-bubble {
        max-width: 75%;
        padding: 0.6rem 0.9rem;
        border-radius: var(--bl-radius-md);
        font-size: 0.9rem;
      }
      .message-bubble.mine {
        align-self: flex-end;
        background: var(--bl-primary);
        color: white;
      }
      .message-bubble.theirs {
        align-self: flex-start;
        background: var(--bl-surface-alt);
        color: var(--bl-text);
      }
      .message-bubble time {
        display: block;
        font-size: 0.7rem;
        opacity: 0.7;
        margin-top: 0.25rem;
      }
      .thread-reply {
        display: flex;
        gap: 0.5rem;
        padding: 1rem;
        border-top: 1px solid var(--bl-border);
      }
      .thread-reply textarea {
        flex: 1;
        padding: 0.6rem;
        border: 1px solid var(--bl-border);
        border-radius: var(--bl-radius-sm);
        font-family: inherit;
        resize: none;
        min-height: 2.5rem;
      }
      .thread-reply button {
        padding: 0 1.25rem;
        background: var(--bl-primary);
        color: white;
        border: none;
        border-radius: var(--bl-radius-md);
        font-weight: 700;
        cursor: pointer;
      }
      .thread-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--bl-text-muted);
        flex: 1;
      }
    </style>
    <script type="module" crossorigin src="/assets/mensajes-BZVKPVtv.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/speed-insights-BTekq8aY.js">
    <link rel="modulepreload" crossorigin href="/assets/nav-utils-B5K5HCX-.js">
    <link rel="stylesheet" crossorigin href="/assets/auth-CZwZ6wpG.css">
    <link rel="stylesheet" crossorigin href="/assets/home-D5wRz0P3.css">
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading-screen" class="auth-loading-screen">
      <div class="auth-loading-spinner"></div>
      <span class="auth-loading-text">Verificando sesión...</span>
    </div>

    <!-- Contenido principal -->
    <div id="main-content">
      <nav class="navbar">
        <div class="navbar__top">
          <a href="./home.html" class="navbar__logo">
            <img src="/assets/logoazulpng-BmcneNO6.png" alt="Baradero Local" class="navbar__logo-img" />
            <div class="navbar__logo-text">
              <span class="navbar__logo-title">Baradero Local</span>
              <span class="navbar__logo-subtitle">Baradero, más cerca que nunca</span>
            </div>
          </a>
          <div class="navbar__actions">
            <div id="nav-notifications-wrap"></div>
            <a href="./home.html" class="navbar__action-circle" aria-label="Volver"><i class="fa-solid fa-arrow-left"></i></a>
          </div>
        </div>
      </nav>

      <main>
        <h1 style="text-align: center; margin: 1.5rem 0 0;">Mensajes</h1>
        <div class="messages-container">
          <div class="conversations-panel" id="conversations-panel">
            <!-- Se llenará con JS -->
          </div>
          <div class="thread-panel" id="thread-panel">
            <div class="thread-empty">Elegí una conversación para ver los mensajes.</div>
          </div>
        </div>
      </main>

      <div class="toast" id="toast" aria-live="polite" role="status"></div>
    </div>

  </body>
</html>
