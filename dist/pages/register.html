<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://cdnjs.cloudflare.com https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://*.googleusercontent.com https://*.supabase.co; connect-src 'self' https://*.supabase.co https://accounts.google.com;">
    <title>Crear Cuenta - Baradero Local</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script type="module" crossorigin src="/assets/register-ABI0nTMb.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/speed-insights-BTekq8aY.js">
    <link rel="stylesheet" crossorigin href="/assets/auth-CZwZ6wpG.css">
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading-screen" class="auth-loading-screen">
      <div class="auth-loading-spinner"></div>
      <span class="auth-loading-text">Verificando sesión...</span>
    </div>

    <!-- Contenido principal -->
    <div id="main-content">
      <main class="auth-layout">
        <div class="auth-header">
          <h1>Crear Cuenta</h1>
          <p>Registrate para poder comprar productos y unirte<br>a la comunidad de <strong>Baradero Local</strong></p>
        </div>

        <div class="auth-card">
          <form id="register-form">
            <div class="auth-inputs">
              <label for="register-email" class="sr-only">Correo electrónico</label>
              <input id="register-email" type="email" placeholder="Correo electrónico" autocomplete="email" class="auth-input" required />
              
              <label for="register-name" class="sr-only">Nombre y apellido</label>
              <input id="register-name" type="text" placeholder="Nombre y apellido" autocomplete="name" class="auth-input" required />
              
              <div class="password-wrapper">
                <label for="register-password" class="sr-only">Contraseña</label>
                <input id="register-password" type="password" placeholder="Contraseña" autocomplete="new-password" class="auth-input" required />
                <button type="button" class="password-toggle-btn" id="toggle-register-password" aria-label="Mostrar contraseña">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>

            <div class="account-type-section">
              <label class="account-type-label">Tipo de Cuenta</label>
              
              <label class="account-type-card" for="type-user">
                <input type="radio" name="account_type" id="type-user" value="cliente" checked>
                <div class="account-type-content">
                  <i class="fa-regular fa-user account-icon"></i>
                  <div class="account-text">
                    <span class="account-title">Cliente</span>
                    <span class="account-desc">Descubre los productos y horarios de comercios locales!</span>
                  </div>
                </div>
              </label>

              <label class="account-type-card" for="type-shop">
                <input type="radio" name="account_type" id="type-shop" value="vendedor">
                <div class="account-type-content">
                  <i class="fa-solid fa-bag-shopping account-icon"></i>
                  <div class="account-text">
                    <span class="account-title">Vendedor</span>
                    <span class="account-desc">Registra tu negocio</span>
                  </div>
                </div>
              </label>
            </div>

            <!-- Checkbox Términos y Condiciones -->
            <label class="auth-terms" for="terms-checkbox" id="terms-label">
              <input type="checkbox" id="terms-checkbox" name="terms" />
              <span class="auth-terms__custom-check"></span>
              <span class="auth-terms__text">
                Acepto los <a href="./terminos.html" class="auth-terms__link" target="_blank">Términos y Condiciones</a> de uso de Baradero Local.
              </span>
            </label>

            <button id="register-btn" class="auth-btn auth-btn-primary" type="submit">Crear cuenta</button>
          </form>
          <!-- Checkbox duplicado eliminado: se usa el mismo #terms-checkbox para ambas acciones -->
          <button id="google-register-btn" class="auth-btn auth-btn-outline" style="margin-top: 16px;" type="button">
            <i class="fa-brands fa-google" style="margin-right: 8px;"></i>Crear cuenta con Google
          </button>
        </div>
        
        <div class="auth-footer">
          ¿Ya tienes una cuenta? <a href="./login.html">Inicia sesión aquí</a>
          <div style="margin-top: 16px;">
            <a href="./home.html" style="color: var(--text-color); opacity: 0.7; font-size: 0.9rem; text-decoration: underline;">
              Quizás más tarde
            </a>
          </div>
        </div>
      </main>
    </div>

  </body>
</html>
