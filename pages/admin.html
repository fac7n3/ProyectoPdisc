<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://cdnjs.cloudflare.com https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://*.googleusercontent.com https://*.supabase.co; connect-src 'self' https://*.supabase.co https://accounts.google.com;">
    <title>SuperAdmin - Baradero Local</title>
    <link rel="stylesheet" href="../Assets/styles/home.css" />
    <link rel="stylesheet" href="../Assets/styles/auth.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      .admin-container {
        max-width: 1000px;
        margin: 3rem auto;
        padding: 2rem;
        background: var(--bl-surface);
        border: 1px solid var(--bl-border);
        border-radius: var(--bl-radius-xl);
        box-shadow: var(--bl-shadow-lg);
      }
      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        border-bottom: 1px solid var(--bl-border);
        padding-bottom: 1rem;
      }
      .admin-header h1 {
        color: var(--bl-primary-deeper);
        margin: 0;
      }
      .table-container {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }
      th, td {
        padding: 1rem;
        text-align: left;
        border-bottom: 1px solid var(--bl-border);
      }
      th {
        background: var(--bl-surface-alt);
        color: var(--bl-text-secondary);
        font-weight: 600;
      }
      .action-btn {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: var(--bl-radius-sm);
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-right: 0.5rem;
      }
      .btn-approve {
        background: #10b981;
        color: white;
      }
      .btn-approve:hover { background: #059669; }
      .btn-reject {
        background: #ef4444;
        color: white;
      }
      .btn-reject:hover { background: #dc2626; }
      .status-badge {
        padding: 0.25rem 0.5rem;
        border-radius: var(--bl-radius-full);
        font-size: 0.875rem;
        font-weight: 600;
      }
      .status-pending { background: #fef3c7; color: #d97706; }
      .status-approved { background: #d1fae5; color: #059669; }
      .status-rejected { background: #fee2e2; color: #dc2626; }
      
      #admin-content { display: none; }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading-screen" class="auth-loading-screen">
      <div class="auth-loading-spinner"></div>
      <span class="auth-loading-text">Verificando sesión...</span>
    </div>

    <!-- Contenido principal -->
    <div id="main-content">
      <nav class="navbar">
        <div class="navbar__top">
          <a href="./home.html" class="navbar__logo">
            <span class="navbar__logo-icon">
              <svg viewBox="0 0 100 100" width="36" height="36" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 0 C 22.4 0 0 22.4 0 50 C 0 75 50 100 50 100 C 50 100 100 75 100 50 C 100 22.4 77.6 0 50 0 Z" fill="#2d4a7c"/>
                <rect x="23" y="25" width="9" height="30" fill="#ffffff"/>
                <path d="M 6 65 L 50 33 L 94 65" stroke="#ffffff" stroke-width="11" stroke-linecap="butt" stroke-linejoin="miter"/>
              </svg>
            </span>
            <div class="navbar__logo-text">
              <span class="navbar__logo-title">Baradero Local</span>
              <span class="navbar__logo-subtitle">Panel SuperAdmin</span>
            </div>
          </a>
          <div class="navbar__actions">
            <a href="./home.html" class="navbar__action-circle" aria-label="Volver"><i class="fa-solid fa-arrow-left"></i></a>
          </div>
        </div>
      </nav>

      <main>
        <div class="admin-container" id="admin-content">
          <div class="admin-header">
            <h1>Solicitudes de Comercios</h1>
            <button class="action-btn" id="btn-refresh" style="background: var(--bl-primary); color: white;"><i class="fa-solid fa-rotate-right"></i> Refrescar</button>
          </div>
          
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Fecha</th>
                  <th>Comercio</th>
                  <th>CUIT</th>
                  <th>Rubro</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="requests-tbody">
                <!-- Se llenará con JS -->
              </tbody>
            </table>
          </div>

          <div class="admin-header" style="margin-top: 3rem;">
            <h1>Solicitudes de Repartidores</h1>
            <button class="action-btn" id="btn-refresh-delivery" style="background: var(--bl-primary); color: white;"><i class="fa-solid fa-rotate-right"></i> Refrescar</button>
          </div>

          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Fecha</th>
                  <th>Nombre</th>
                  <th>Teléfono</th>
                  <th>Vehículo</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="delivery-requests-tbody">
                <!-- Se llenará con JS -->
              </tbody>
            </table>
          </div>
        </div>
      </main>

      <!-- Notificación Toast -->
      <div class="toast" id="toast" aria-live="polite" role="status"></div>
    </div>

    <script type="module" src="../js/admin.js"></script>
  </body>
</html>
